name: Feature request
description: Propose an improvement for Ryze
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What do you want to add or change?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: API and platform impact
      description: Mention public API, module, or Apple platform implications
