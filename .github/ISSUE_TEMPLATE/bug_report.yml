name: Bug report
description: Report a defect or regression in Ryze
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share a minimal reproduction path
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected module
      options:
        - RyzeFoundation
        - RyzeNetwork
        - RyzeArchitecture
        - RyzeUI
        - RyzeVideo
        - RyzeIntelligence
        - Other
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Toolchain
      description: Swift / Xcode / OS version
