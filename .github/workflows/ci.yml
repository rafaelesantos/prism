name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  quality:
    name: Lint → Test
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Toolchain info
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Lint
        run: ./scripts/lint.sh

      - name: Test
        run: ./scripts/test.sh

      - name: Generate coverage badge
        if: success() && github.ref == 'refs/heads/main'
        run: ./scripts/coverage.sh --badge-only

      - name: Commit coverage badge
        if: success() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage-badge.json
          git diff --cached --quiet && echo "No coverage change" && exit 0
          git commit -m "ci: update coverage badge"
          git push origin main

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: .build/artifacts/test-results.xml
          if-no-files-found: ignore
