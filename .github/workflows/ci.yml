name: Quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Lint
        run: ./scripts/lint.sh

      - name: Build
        run: ./scripts/build.sh

      - name: Test
        run: ./scripts/test.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .build/artifacts/test-results.xml
          if-no-files-found: ignore
