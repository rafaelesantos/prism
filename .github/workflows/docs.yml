name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode with Swift 6.3
        run: |
          for xcode in $(ls -d /Applications/Xcode*.app 2>/dev/null | sort -rV); do
            SWIFT_VER=$("$xcode/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift" --version 2>/dev/null | head -1 || true)
            echo "$xcode → $SWIFT_VER"
            if echo "$SWIFT_VER" | grep -q "6\.3"; then
              echo "Found Swift 6.3 in $xcode"
              sudo xcode-select -s "$xcode"
              exit 0
            fi
          done
          echo "::error::No Xcode with Swift 6.3 found"
          exit 1

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-docs-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-docs-${{ runner.os }}-

      - name: Build documentation
        run: |
          targets=(PrismFoundation PrismNetwork PrismArchitecture PrismUI PrismVideo PrismIntelligence Prism)
          for target in "${targets[@]}"; do
              echo "Building $target..."
              swift package generate-documentation \
                  --target "$target" \
                  --disable-indexing \
                  --transform-for-static-hosting
          done

      - name: Assemble output
        run: |
          mkdir -p docs-output
          build_dir=".build/plugins/Swift-DocC/outputs"
          targets=(PrismFoundation PrismNetwork PrismArchitecture PrismUI PrismVideo PrismIntelligence Prism)
          for target in "${targets[@]}"; do
              cp -R "$build_dir/$target.doccarchive" "docs-output/$target"
          done

      - name: Generate index page
        run: cp scripts/docs-index.html docs-output/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-output

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
