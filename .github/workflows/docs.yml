name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-docs-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-docs-${{ runner.os }}-

      - name: Build documentation
        run: |
          targets=(PrismFoundation PrismNetwork PrismArchitecture PrismUI PrismVideo PrismIntelligence Prism)
          for target in "${targets[@]}"; do
              echo "Building $target..."
              swift package generate-documentation \
                  --target "$target" \
                  --disable-indexing \
                  --transform-for-static-hosting \
                  --hosting-base-path "prism/$target"
          done

      - name: Assemble output
        run: |
          mkdir -p docs-output
          build_dir=".build/plugins/Swift-DocC/outputs"
          targets=(PrismFoundation PrismNetwork PrismArchitecture PrismUI PrismVideo PrismIntelligence Prism)
          for target in "${targets[@]}"; do
              cp -R "$build_dir/$target.doccarchive" "docs-output/$target"
          done

      - name: Generate index page
        run: cp scripts/docs-index.html docs-output/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-output

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
