name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-docs-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-docs-${{ runner.os }}-

      - name: Build documentation
        run: |
          targets=(PrismFoundation PrismNetwork PrismArchitecture PrismUI PrismVideo PrismIntelligence Prism)
          for target in "${targets[@]}"; do
              echo "Building $target..."
              swift package generate-documentation \
                  --target "$target" \
                  --disable-indexing \
                  --transform-for-static-hosting
          done

      - name: Assemble output
        run: |
          mkdir -p docs-output
          build_dir=".build/plugins/Swift-DocC/outputs"
          targets=(PrismFoundation PrismNetwork PrismArchitecture PrismUI PrismVideo PrismIntelligence Prism)
          for target in "${targets[@]}"; do
              cp -R "$build_dir/$target.doccarchive" "docs-output/$target"
          done

      - name: Generate index page
        run: |
          cat > docs-output/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="utf-8">
              <title>Prism Documentation</title>
              <style>
                  body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; }
                  h1 { font-size: 1.5rem; }
                  a { display: block; padding: 0.5rem 0; color: #0066cc; text-decoration: none; }
                  a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <h1>Prism Documentation</h1>
              <a href="Prism/documentation/prism/">Prism (umbrella)</a>
              <a href="PrismFoundation/documentation/prismfoundation/">PrismFoundation</a>
              <a href="PrismNetwork/documentation/prismnetwork/">PrismNetwork</a>
              <a href="PrismArchitecture/documentation/prismarchitecture/">PrismArchitecture</a>
              <a href="PrismUI/documentation/prismui/">PrismUI</a>
              <a href="PrismVideo/documentation/prismvideo/">PrismVideo</a>
              <a href="PrismIntelligence/documentation/prismintelligence/">PrismIntelligence</a>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-output

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
